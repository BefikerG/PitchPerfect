spring.application.name=PitchPerfect
server.port=8081

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/pitch_perfect
spring.datasource.username=root
spring.datasource.password=rootpassword
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# JWT Configuration
jwt.secret=ThisIsAVeryLongSecretKeyThatNeedsToBeAtLeast256BitsLongForJwts
jwt.expiration=86400000

# Super Admin - only this account can demote other admins
app.super-admin-email=admin@pitchperfect.com

# File Upload Configuration
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB